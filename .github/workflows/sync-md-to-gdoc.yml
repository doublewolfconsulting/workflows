name: Sync Markdown to Google Doc

on:
  workflow_call:
    inputs:
      md_file:
        description: Path to the markdown file (e.g. docs/prd.md)
        required: true
        type: string
      reference_doc:
        description: Optional path to a .docx reference template for Pandoc styling
        required: false
        type: string
        default: ""
    secrets:
      WORKLOAD_IDENTITY_PROVIDER:
        description: Workload Identity Federation provider resource name
        required: true
      SERVICE_ACCOUNT_EMAIL:
        description: Google service account email
        required: true
      GOOGLE_DOC_ID:
        description: Google Doc file ID
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Install Pandoc
        run: |
          PANDOC_VERSION=$(curl -s https://api.github.com/repos/jgm/pandoc/releases/latest | grep tag_name | cut -d '"' -f 4)
          curl -sL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb" -o pandoc.deb
          sudo dpkg -i pandoc.deb

      - name: Convert Markdown to DOCX
        run: |
          if [ -n "${{ inputs.reference_doc }}" ]; then
            pandoc "${{ inputs.md_file }}" --from markdown+pipe_tables --reference-doc="${{ inputs.reference_doc }}" -o output.docx
          else
            pandoc "${{ inputs.md_file }}" --from markdown+pipe_tables -o output.docx
          fi

      - name: Install Python dependencies
        run: pip install google-auth google-api-python-client lxml

      - name: Upload DOCX artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: output-docx
          path: output.docx

      - name: Post-process DOCX
        run: |
          python3 << 'EOF'
          import zipfile, shutil
          from lxml import etree

          ns = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main'
          W = lambda tag: f'{{{ns}}}{tag}'

          def get_or_create(parent, tag, insert_pos=0):
              el = parent.find(W(tag))
              if el is None:
                  el = etree.SubElement(parent, W(tag))
                  parent.insert(insert_pos, el)
              return el

          def replace_child(parent, new_el):
              tag = new_el.tag
              old = parent.find(tag)
              if old is not None:
                  parent.remove(old)
              parent.append(new_el)

          shutil.copy('output.docx', 'temp.docx')

          with zipfile.ZipFile('temp.docx', 'r') as zin, \
               zipfile.ZipFile('output.docx', 'w', zipfile.ZIP_DEFLATED) as zout:
              for item in zin.infolist():
                  data = zin.read(item.filename)
                  if item.filename == 'word/document.xml':
                      root = etree.fromstring(data)
                      body = root.find(W('body'))

                      # 1. Remove bookmarks
                      for el in root.iter(W('bookmarkStart'), W('bookmarkEnd')):
                          el.getparent().remove(el)

                      # 2. Insert empty paragraph before tables and horizontal rules,
                      #    and after tables
                      def make_spacer():
                          spacer = etree.Element(W('p'))
                          pPr = etree.SubElement(spacer, W('pPr'))
                          sp = etree.SubElement(pPr, W('spacing'))
                          sp.set(W('before'), '0')
                          sp.set(W('after'), '0')
                          return spacer

                      def is_hr(p):
                          pPr = p.find(W('pPr'))
                          if pPr is None:
                              return False
                          # Inline border
                          if pPr.find(W('pBdr')) is not None:
                              return True
                          # Style-based horizontal rule
                          pStyle = pPr.find(W('pStyle'))
                          if pStyle is not None and pStyle.get(W('val'), '').lower() in ('horizontalrule', 'horizontal rule'):
                              return True
                          return False

                      def is_bold_subheading(p):
                          runs = p.findall(W('r'))
                          if not runs:
                              return False
                          for r in runs:
                              rPr = r.find(W('rPr'))
                              if rPr is None or rPr.find(W('b')) is None:
                                  return False
                          return True

                      for i, child in reversed(list(enumerate(body))):
                          if child.tag == W('tbl'):
                              body.insert(i, make_spacer())       # before table
                              body.insert(i + 2, make_spacer())   # after table
                          elif child.tag == W('p'):
                              if is_hr(child) or is_bold_subheading(child):
                                  body.insert(i, make_spacer())

                      # 3. Tables: full width (autofit) + black borders + cell padding
                      for tbl in root.iter(W('tbl')):
                          tblPr = get_or_create(tbl, 'tblPr')
                          replace_child(tblPr, etree.fromstring(f'<w:tblW xmlns:w="{ns}" w:w="0" w:type="auto"/>'))
                          replace_child(tblPr, etree.fromstring(f'<w:tblLayout xmlns:w="{ns}" w:type="autofit"/>'))
                          # Remove fixed gridCol widths
                          tblGrid = tbl.find(W('tblGrid'))
                          if tblGrid is not None:
                              for gc in tblGrid.findall(W('gridCol')):
                                  gc.attrib.pop(W('w'), None)
                          for tc in tbl.iter(W('tc')):
                              tcPr = get_or_create(tc, 'tcPr')
                              replace_child(tcPr, etree.fromstring(f'''<w:tcBorders xmlns:w="{ns}">
                                <w:top w:val="single" w:sz="4" w:space="0" w:color="000000"/>
                                <w:left w:val="single" w:sz="4" w:space="0" w:color="000000"/>
                                <w:bottom w:val="single" w:sz="4" w:space="0" w:color="000000"/>
                                <w:right w:val="single" w:sz="4" w:space="0" w:color="000000"/>
                              </w:tcBorders>'''))
                              replace_child(tcPr, etree.fromstring(f'''<w:tcMar xmlns:w="{ns}">
                                <w:top w:w="100" w:type="dxa"/>
                                <w:left w:w="150" w:type="dxa"/>
                                <w:bottom w:w="100" w:type="dxa"/>
                                <w:right w:w="150" w:type="dxa"/>
                              </w:tcMar>'''))

                      # 4. Horizontal rule spacing + justify all body paragraphs
                      for p in root.iter(W('p')):
                          if p.getparent().tag == W('body') or p.getparent().tag == W('tc'):
                              pPr = get_or_create(p, 'pPr')
                              if is_hr(p):
                                  replace_child(pPr, etree.fromstring(
                                      f'<w:spacing xmlns:w="{ns}" w:before="480" w:after="480"/>'))
                              else:
                                  replace_child(pPr, etree.fromstring(
                                      f'<w:jc xmlns:w="{ns}" w:val="both"/>'))

                      data = etree.tostring(root, xml_declaration=True, encoding='UTF-8', standalone=True)
                  zout.writestr(item, data)

          print('Post-processing complete')
          EOF

      - name: Upload to Google Drive
        env:
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
        run: |
          python3 << 'EOF'
          import os
          import google.auth
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          creds, _ = google.auth.default(scopes=['https://www.googleapis.com/auth/drive'])
          service = build('drive', 'v3', credentials=creds)

          file_id = os.environ['GOOGLE_DOC_ID']
          media = MediaFileUpload(
              'output.docx',
              mimetype='application/vnd.openxmlformats-officedocument.wordprocessingml.document'
          )
          service.files().update(fileId=file_id, media_body=media).execute()
          print(f'Synced to Google Doc: {file_id}')
          EOF
